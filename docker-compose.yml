services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: uns-calendar-api:latest
    container_name: uns-calendar-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3002:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_UID: ${UID:-1000}
        BUILD_GID: ${GID:-1000}
    image: uns-calendar-frontend:latest
    container_name: uns-calendar-frontend
    restart: "no"
    depends_on:
      - api
    volumes:
      - ./dist:/dist


networks:
  default:
    name: uns-calendar-net
