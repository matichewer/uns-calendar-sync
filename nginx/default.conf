server {
    listen 80;
    server_name calendario-uns.chewer.net;

    # Redirect HTTP to HTTPS (optional if you set up certs)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name calendario-uns.chewer.net;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Serve frontend (adjust `root` to where you copy the `dist` folder on the host)
    # example: /var/www/calendario-uns
    location / {
        root /var/www/calendario-uns;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to api service (assumes api is published on host:3002)
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
    }

    # Prevent access to sensitive files
    location ~* /(\.env|docker-compose\.yml|Dockerfile)$ {
        deny all;
    }
}
