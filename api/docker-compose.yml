services:
  uns-proxy:
    build: .
    container_name: uns-calendar-proxy
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3